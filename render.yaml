services:
  - type: web
    name: smartpricing-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Real values are never stored here -- sync: false makes Render prompt
      # for each of these once, during Blueprint creation in the dashboard.
      - key: DATABASE_URL
        sync: false
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      # Not prompted -- Render generates a random secure value itself, so
      # this needs zero manual entry and is never typed anywhere.
      - key: SECRET_KEY
        generateValue: true
      # Set once, after the frontend service exists and its real Render URL
      # is known (see main.py's CORS config) -- can't be known at Blueprint
      # creation time since both services are created together.
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: smartpricing-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Same reasoning as FRONTEND_URL above, other direction: the backend's
      # real URL isn't known until its service exists.
      - key: VITE_API_BASE_URL
        sync: false
